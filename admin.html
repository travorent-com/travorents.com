<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin — TravoRents</title>
<meta name="robots" content="noindex, nofollow">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&family=Montserrat:wght@700;800;900&display=swap" rel="stylesheet">
<style>
  :root{
    --primary:#0C447C;--primary-mid:#185FA5;--primary-light:#378ADD;
    --accent:#EF9F27;--accent-dark:#BA7517;
    --dark:#1c1c1c;--gray:#6c757d;--light:#f6f8fa;--white:#fff;
    --border:#e6e9ee;
    --success:#1f9d55;--success-bg:#e8f8ee;
    --pending-bg:#fff4e0;--pending-text:#9a6500;
  }
  *{box-sizing:border-box;}
  body{margin:0;font-family:'Poppins',sans-serif;background:var(--light);color:var(--dark);}
  header{background:var(--primary);color:#fff;padding:18px 28px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;}
  header h1{font-family:'Montserrat',sans-serif;font-size:20px;font-weight:800;margin:0;}
  header h1 span{color:var(--accent);}
  header a{color:#dce8f5;text-decoration:none;font-size:13px;font-weight:600;}
  header a:hover{color:#fff;}
  main{max-width:1180px;margin:0 auto;padding:28px 20px 60px;}

  .tabs{display:flex;gap:8px;margin-bottom:20px;}
  .tab-btn{background:#fff;border:2px solid var(--border);border-radius:10px;padding:10px 18px;font-weight:600;font-size:14px;color:var(--gray);cursor:pointer;font-family:'Poppins',sans-serif;}
  .tab-btn.active{border-color:var(--primary);color:var(--primary);background:#eef5fc;}

  .stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:14px;margin-bottom:24px;}
  .stat-card{background:#fff;border:1px solid var(--border);border-radius:12px;padding:16px 18px;}
  .stat-card .num{font-family:'Montserrat',sans-serif;font-size:26px;font-weight:800;color:var(--primary);}
  .stat-card .label{font-size:12.5px;color:var(--gray);margin-top:2px;}

  .panel{background:#fff;border:1px solid var(--border);border-radius:14px;overflow:hidden;}
  .panel-head{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap;}
  .panel-head h2{font-size:16px;font-weight:700;margin:0;}
  .refresh-btn{background:var(--primary);color:#fff;border:none;border-radius:8px;padding:8px 14px;font-size:13px;font-weight:600;cursor:pointer;font-family:'Poppins',sans-serif;}
  .refresh-btn:hover{background:var(--primary-mid);}

  table{width:100%;border-collapse:collapse;font-size:13.5px;}
  th{text-align:left;padding:11px 16px;background:#fafbfc;color:var(--gray);font-weight:600;font-size:12px;text-transform:uppercase;letter-spacing:.4px;border-bottom:1px solid var(--border);white-space:nowrap;}
  td{padding:12px 16px;border-bottom:1px solid var(--border);vertical-align:top;}
  tr:last-child td{border-bottom:none;}
  tr:hover td{background:#fafcff;}

  .badge{display:inline-block;padding:4px 10px;border-radius:50px;font-size:11.5px;font-weight:700;}
  .badge.completed{background:var(--success-bg);color:var(--success);}
  .badge.pending{background:var(--pending-bg);color:var(--pending-text);}
  .badge.failed{background:#fde8e8;color:#c0392b;}

  .badge.cat{background:#eef5fc;color:var(--primary);}
  .avail-on{color:var(--success);font-weight:600;}
  .avail-off{color:#c0392b;font-weight:600;}
  .toggle-btn{border:1px solid var(--border);background:#fff;border-radius:7px;padding:5px 10px;font-size:12px;font-weight:600;cursor:pointer;color:var(--gray);}
  .toggle-btn:hover{border-color:var(--primary);color:var(--primary);}

  .empty,.loading{padding:40px 20px;text-align:center;color:var(--gray);font-size:14px;}
  .ref{font-family:monospace;font-size:12.5px;color:var(--primary);}

  .add-vehicle{padding:16px 20px;border-top:1px solid var(--border);background:#fafbfc;}
  .add-vehicle h3{font-size:14px;margin:0 0 12px;}
  .add-vehicle form{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:10px;align-items:end;}
  .add-vehicle label{font-size:11.5px;color:var(--gray);font-weight:600;display:block;margin-bottom:4px;}
  .add-vehicle input,.add-vehicle select{width:100%;padding:8px 10px;border:1px solid var(--border);border-radius:7px;font-size:13px;font-family:'Poppins',sans-serif;}
  .add-vehicle .submit-btn{background:var(--accent);color:#3a1f00;border:none;border-radius:7px;padding:9px 14px;font-weight:700;font-size:13px;cursor:pointer;height:38px;}
  .add-vehicle .submit-btn:hover{background:var(--accent-dark);color:#fff;}

  .hidden{display:none;}
  @media (max-width:700px){ header{padding:14px 16px;} table{font-size:12.5px;} th,td{padding:9px 10px;} }
</style>
</head>
<body>

<header>
  <h1>TravoRents <span>Admin</span></h1>
  <a href="index.html">← Back to site</a>
</header>

<main>
  <div class="stats" id="statsRow"></div>

  <div class="tabs">
    <button class="tab-btn active" data-tab="bookings" onclick="switchTab('bookings', this)">Bookings</button>
    <button class="tab-btn" data-tab="vehicles" onclick="switchTab('vehicles', this)">Vehicles</button>
  </div>

  <section id="tab-bookings" class="panel">
    <div class="panel-head">
      <h2>All bookings</h2>
      <button class="refresh-btn" onclick="loadBookings()">Refresh</button>
    </div>
    <div id="bookingsTableWrap"><div class="loading">Loading bookings…</div></div>
  </section>

  <section id="tab-vehicles" class="panel hidden">
    <div class="panel-head">
      <h2>All vehicles</h2>
      <button class="refresh-btn" onclick="loadVehicles()">Refresh</button>
    </div>
    <div id="vehiclesTableWrap"><div class="loading">Loading vehicles…</div></div>

    <div class="add-vehicle">
      <h3>Add a new vehicle</h3>
      <form id="addVehicleForm" onsubmit="handleAddVehicle(event)">
        <div><label>Name</label><input name="name" required placeholder="e.g. Honda Activa 6G"></div>
        <div><label>Category</label>
          <select name="category" required>
            <option value="car">Car</option>
            <option value="bike">Bike</option>
          </select>
        </div>
        <div><label>Image path</label><input name="image" required placeholder="images/example.jpeg"></div>
        <div><label>Price / 12hr</label><input name="price_12hr" type="number" placeholder="optional"></div>
        <div><label>Price / 24hr</label><input name="price_24hr" type="number" required></div>
        <div><label>Transmission</label>
          <select name="transmission">
            <option value="Manual">Manual</option>
            <option value="Automatic">Automatic</option>
          </select>
        </div>
        <div><label>Fuel</label><input name="fuel" value="Petrol"></div>
        <div><label>Seats</label><input name="seats" type="number" value="5"></div>
        <div><button type="submit" class="submit-btn">Add vehicle</button></div>
      </form>
    </div>
  </section>
</main>

<script>
const API_BASE = "http://127.0.0.1:3000";

function switchTab(tab, btn){
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('tab-bookings').classList.toggle('hidden', tab!=='bookings');
  document.getElementById('tab-vehicles').classList.toggle('hidden', tab!=='vehicles');
}

function escapeHtml(str){
  return String(str ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function fmtMoney(n){
  if (n === null || n === undefined) return '—';
  return '₹' + Number(n).toLocaleString('en-IN');
}

function fmtDateTime(s){
  if (!s) return '—';
  try { return new Date(s.replace(' ', 'T') + 'Z').toLocaleString('en-IN', {dateStyle:'medium', timeStyle:'short'}); }
  catch { return s; }
}

async function loadStats(bookings, vehicles){
  const completed = bookings.filter(b => b.payment_status === 'completed');
  const revenue = completed.reduce((sum, b) => sum + (b.total_amount || 0), 0);
  const stats = [
    { label: 'Total bookings', num: bookings.length },
    { label: 'Completed', num: completed.length },
    { label: 'Pending / abandoned', num: bookings.length - completed.length },
    { label: 'Revenue collected', num: fmtMoney(revenue) },
    { label: 'Vehicles listed', num: vehicles.length },
  ];
  document.getElementById('statsRow').innerHTML = stats.map(s => `
    <div class="stat-card"><div class="num">${s.num}</div><div class="label">${s.label}</div></div>
  `).join('');
}

let cachedVehicles = [];

async function loadBookings(){
  const wrap = document.getElementById('bookingsTableWrap');
  wrap.innerHTML = '<div class="loading">Loading bookings…</div>';
  try {
    const res = await fetch(`${API_BASE}/api/bookings`);
    const data = await res.json();
    if (!data.success) throw new Error(data.message || 'Failed to load');
    const bookings = data.bookings;

    loadStats(bookings, cachedVehicles);

    if (bookings.length === 0) {
      wrap.innerHTML = '<div class="empty">No bookings yet. They\'ll show up here as soon as a customer checks out.</div>';
      return;
    }

    wrap.innerHTML = `
      <table>
        <thead><tr>
          <th>Ref</th><th>Vehicle</th><th>Customer</th><th>Pickup → Return</th>
          <th>Amount</th><th>Status</th><th>Created</th>
        </tr></thead>
        <tbody>
          ${bookings.map(b => `
            <tr>
              <td class="ref">${escapeHtml(b.booking_ref)}</td>
              <td>${escapeHtml(b.vehicle_name)}</td>
              <td>
                ${escapeHtml(b.customer_name || '—')}<br>
                <span style="color:var(--gray);font-size:12px">${escapeHtml(b.customer_phone || '')}</span>
              </td>
              <td>${escapeHtml(b.pickup_date)} ${escapeHtml(b.pickup_time||'')}<br>→ ${escapeHtml(b.return_date)} ${escapeHtml(b.return_time||'')}</td>
              <td>${fmtMoney(b.total_amount)}</td>
              <td><span class="badge ${escapeHtml(b.payment_status)}">${escapeHtml(b.payment_status)}</span></td>
              <td>${fmtDateTime(b.created_at)}</td>
            </tr>
          `).join('')}
        </tbody>
      </table>
    `;
  } catch (err) {
    wrap.innerHTML = `<div class="empty">Couldn't reach the backend at ${API_BASE}. Make sure the server is running (<code>node whatsapp-backend.js</code>).</div>`;
    console.error(err);
  }
}

async function loadVehicles(){
  const wrap = document.getElementById('vehiclesTableWrap');
  wrap.innerHTML = '<div class="loading">Loading vehicles…</div>';
  try {
    const res = await fetch(`${API_BASE}/api/vehicles`);
    const data = await res.json();
    if (!data.success) throw new Error(data.message || 'Failed to load');
    cachedVehicles = data.vehicles;

    if (data.vehicles.length === 0) {
      wrap.innerHTML = '<div class="empty">No vehicles yet. Add one below.</div>';
      return;
    }

    wrap.innerHTML = `
      <table>
        <thead><tr>
          <th>Name</th><th>Category</th><th>Price /24hr</th><th>Transmission</th><th>Fuel</th><th>Seats</th><th>Available</th><th></th>
        </tr></thead>
        <tbody>
          ${data.vehicles.map(v => `
            <tr>
              <td>${escapeHtml(v.name)}</td>
              <td><span class="badge cat">${escapeHtml(v.category)}</span></td>
              <td>${fmtMoney(v.price_24hr)}</td>
              <td>${escapeHtml(v.transmission || '—')}</td>
              <td>${escapeHtml(v.fuel || '—')}</td>
              <td>${v.seats ?? '—'}</td>
              <td><span class="${v.available ? 'avail-on' : 'avail-off'}">${v.available ? 'Yes' : 'No'}</span></td>
              <td><button class="toggle-btn" onclick="toggleAvailability(${v.id}, ${v.available ? 0 : 1})">${v.available ? 'Mark unavailable' : 'Mark available'}</button></td>
            </tr>
          `).join('')}
        </tbody>
      </table>
    `;
  } catch (err) {
    wrap.innerHTML = `<div class="empty">Couldn't reach the backend at ${API_BASE}. Make sure the server is running (<code>node whatsapp-backend.js</code>).</div>`;
    console.error(err);
  }
}

async function toggleAvailability(id, available){
  try {
    await fetch(`${API_BASE}/api/vehicles/${id}`, {
      method: 'PATCH',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ available })
    });
    loadVehicles();
  } catch (err) {
    alert('Could not update vehicle availability.');
    console.error(err);
  }
}

async function handleAddVehicle(e){
  e.preventDefault();
  const form = e.target;
  const fd = new FormData(form);
  const payload = {
    name: fd.get('name'),
    category: fd.get('category'),
    image: fd.get('image'),
    price_12hr: fd.get('price_12hr') ? Number(fd.get('price_12hr')) : null,
    price_24hr: Number(fd.get('price_24hr')),
    transmission: fd.get('transmission'),
    fuel: fd.get('fuel'),
    seats: fd.get('seats') ? Number(fd.get('seats')) : null,
  };
  try {
    const res = await fetch(`${API_BASE}/api/vehicles`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload)
    });
    const data = await res.json();
    if (!data.success) throw new Error(data.message || 'Failed to add vehicle');
    form.reset();
    loadVehicles();
  } catch (err) {
    alert('Could not add vehicle: ' + err.message);
    console.error(err);
  }
}

// Initial load
loadVehicles().then(loadBookings);
</script>

</body>
</html>
