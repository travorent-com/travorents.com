<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Contact Us - TravoRents</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
body{font-family:'Poppins',sans-serif;margin:0;background:#f5f7fb;color:#222}
header{background:#0C447C;color:white;padding:20px;text-align:center}
.container{max-width:1000px;margin:40px auto;background:white;padding:40px;border-radius:15px;box-shadow:0 5px 20px rgba(0,0,0,.1)}
h1,h2{color:#0C447C}
p,li{line-height:1.8}
a{color:#0C447C;text-decoration:none}
a:hover{color:#EF9F27}
footer{background:#0C447C;color:white;text-align:center;padding:20px;margin-top:40px}
.btn{background:#EF9F27;color:white;padding:12px 25px;border-radius:8px;display:inline-block;margin-top:15px;font-weight:bold}

/* ═════════ SPLASH SCREEN ═════════ */
.splash-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:linear-gradient(135deg,#07213f 0%,#0a2d56 50%,#0C447C 100%);display:flex;align-items:center;justify-content:center;z-index:9999;animation:fadeInSplash 1s ease-in-out;}
.splash-container{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:30px;animation:fadeIn 1s ease-in-out;}
.logo-wrapper{animation:slideDown 1.2s cubic-bezier(0.34,1.56,0.64,1);}
.logo-image{width:280px;height:auto;max-height:140px;animation:logoPulseAnim 2s ease-in-out infinite;filter:drop-shadow(0 8px 16px rgba(0,0,0,0.2));}
.transaction-flow{display:flex;gap:20px;align-items:center;animation:fadeInUp 1.5s ease-in-out 0.3s both;}
.transaction-step{width:60px;height:60px;border-radius:50%;background:rgba(255,255,255,0.15);border:2px solid rgba(24,95,165,0.8);display:flex;align-items:center;justify-content:center;color:#378ADD;font-size:24px;font-weight:600;}
.transaction-step:nth-child(1){animation:stepBounce 0.8s ease-in-out 0.5s infinite;}
.transaction-step:nth-child(2){animation:stepBounce 0.8s ease-in-out 0.7s infinite;}
.transaction-step:nth-child(3){animation:stepBounce 0.8s ease-in-out 0.9s infinite;}
.step-connector{width:30px;height:3px;background:linear-gradient(90deg,transparent,#378ADD,transparent);animation:connectorGrow 0.8s ease-in-out 1.2s infinite;}
.splash-text{text-align:center;animation:fadeInUp 1.5s ease-in-out 0.6s both;}
.splash-text h1{color:#fff;font-size:28px;font-weight:700;margin-bottom:10px;letter-spacing:-0.5px;}
.splash-text p{color:rgba(255,255,255,0.7);font-size:14px;font-weight:500;}
.loading-dots{display:flex;gap:6px;animation:fadeInUp 1.5s ease-in-out 0.9s both;}
.dot{width:8px;height:8px;border-radius:50%;background:#378ADD;animation:dotBounce 1.4s infinite;}
.dot:nth-child(1){animation-delay:0s;}
.dot:nth-child(2){animation-delay:0.2s;}
.dot:nth-child(3){animation-delay:0.4s;}
@keyframes fadeInSplash{from{opacity:0;}to{opacity:1;}}
@keyframes fadeIn{from{opacity:0;}to{opacity:1;}}
@keyframes slideDown{from{opacity:0;transform:translateY(-50px) scale(0.9);}to{opacity:1;transform:translateY(0) scale(1);}}
@keyframes fadeInUp{from{opacity:0;transform:translateY(30px);}to{opacity:1;transform:translateY(0);}}
@keyframes logoPulseAnim{0%,100%{transform:scale(1);filter:drop-shadow(0 0 0 rgba(55,138,221,0.5));} 50%{transform:scale(1.05);filter:drop-shadow(0 0 20px rgba(55,138,221,0.7));}}
@keyframes stepBounce{0%,100%{transform:scale(1);} 50%{transform:scale(1.15);}}
@keyframes connectorGrow{0%,100%{opacity:0.3;width:20px;} 50%{opacity:1;width:40px;}}
@keyframes dotBounce{0%,100%{opacity:0.3;transform:translateY(0);} 50%{opacity:1;transform:translateY(-10px);}}
.splash-fade-out{animation:fadeOutSplash 0.8s ease-in-out forwards;}
@keyframes fadeOutSplash{to{opacity:0;transform:scale(0.98);}}
@media(max-width:768px){.logo-image{width:200px;max-height:100px;}.splash-text h1{font-size:22px;}.transaction-step{width:50px;height:50px;font-size:18px;}}
</style>
</head>
<body>
<!-- SPLASH SCREEN -->
<div class="splash-overlay" id="splashOverlay">
  <div class="splash-container">
    <div class="logo-wrapper">
      <img src="mainlogo2.jpeg" alt="Travo Rents Logo" class="logo-image">
    </div>
    <div class="transaction-flow">
      <div class="transaction-step"><span>$</span></div>
      <div class="step-connector"></div>
      <div class="transaction-step"><span>✓</span></div>
      <div class="step-connector"></div>
      <div class="transaction-step"><span>🚗</span></div>
    </div>
    <div class="splash-text">
      <h1>Travo Rents</h1>
      <p>Processing Your Booking...</p>
    </div>
    <div class="loading-dots">
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>
    </div>
  </div>
</div>

<script>
  document.addEventListener('DOMContentLoaded', function() {
    const splash = document.getElementById('splashOverlay');
    if(splash) {
      setTimeout(function() {
        splash.classList.add('splash-fade-out');
        setTimeout(function() {
          splash.style.display = 'none';
        }, 800);
      }, 3500);
    }
  });
</script>

<header><h2>TravoRents.com</h2></header>
<div class="container">

<a href="index.html" class="btn">Back To Home</a>
</div>
<footer>© 2026 TravoRents.com | All Rights Reserved</footer>
</body>
</html>
