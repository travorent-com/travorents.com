<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Travo Rents - Loading</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', 'Montserrat', sans-serif;
            background: linear-gradient(135deg, #07213f 0%, #0a2d56 50%, #0C447C 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .splash-container {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 30px;
            animation: fadeIn 1s ease-in-out;
        }

        .logo-wrapper {
            position: relative;
            animation: slideDown 1.2s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .logo-svg {
            width: 280px;
            height: auto;
            max-height: 140px;
            animation: logoPulse 2s ease-in-out infinite;
        }

        .logo-image {
            width: 280px;
            height: auto;
            max-height: 140px;
            animation: logoPulse 2s ease-in-out infinite;
        }

        .transaction-flow {
            display: flex;
            gap: 20px;
            align-items: center;
            animation: fadeInUp 1.5s ease-in-out 0.3s both;
        }

        .transaction-step {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.15);
            border: 2px solid rgba(24, 95, 165, 0.8);
            display: flex;
            align-items: center;
            justify-content: center;
            color: #378ADD;
            font-size: 24px;
            position: relative;
            font-weight: 600;
        }

        .transaction-step:nth-child(1) {
            animation: stepBounce 0.8s ease-in-out 0.5s infinite;
        }

        .transaction-step:nth-child(2) {
            animation: stepBounce 0.8s ease-in-out 0.7s infinite;
        }

        .transaction-step:nth-child(3) {
            animation: stepBounce 0.8s ease-in-out 0.9s infinite;
        }

        .step-connector {
            width: 30px;
            height: 3px;
            background: linear-gradient(90deg, transparent, #378ADD, transparent);
            animation: connectorGrow 0.8s ease-in-out 1.2s infinite;
        }

        .text-wrapper {
            text-align: center;
            animation: fadeInUp 1.5s ease-in-out 0.6s both;
        }

        .text-wrapper h1 {
            color: #fff;
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 10px;
            letter-spacing: -0.5px;
        }

        .text-wrapper p {
            color: rgba(255, 255, 255, 0.7);
            font-size: 14px;
            font-weight: 500;
        }

        .loading-dots {
            display: flex;
            gap: 6px;
            animation: fadeInUp 1.5s ease-in-out 0.9s both;
        }

        .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #378ADD;
            animation: dotBounce 1.4s infinite;
        }

        .dot:nth-child(1) { animation-delay: 0s; }
        .dot:nth-child(2) { animation-delay: 0.2s; }
        .dot:nth-child(3) { animation-delay: 0.4s; }

        /* Animations */
        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-50px) scale(0.9);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        @keyframes logoPulse {
            0%, 100% {
                transform: scale(1);
                filter: drop-shadow(0 0 0 rgba(55, 138, 221, 0.5));
            }
            50% {
                transform: scale(1.05);
                filter: drop-shadow(0 0 20px rgba(55, 138, 221, 0.7));
            }
        }

        @keyframes stepBounce {
            0%, 100% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.15);
            }
        }

        @keyframes connectorGrow {
            0%, 100% {
                opacity: 0.3;
                width: 20px;
            }
            50% {
                opacity: 1;
                width: 40px;
            }
        }

        @keyframes dotBounce {
            0%, 100% {
                opacity: 0.3;
                transform: translateY(0);
            }
            50% {
                opacity: 1;
                transform: translateY(-10px);
            }
        }

        /* Fade out animation */
        .fade-out {
            animation: fadeOutScreen 0.8s ease-in-out forwards;
        }

        @keyframes fadeOutScreen {
            to {
                opacity: 0;
                transform: scale(0.98);
            }
        }

        /* SVG Logo Container */
        svg {
            filter: drop-shadow(0 8px 16px rgba(0, 0, 0, 0.2));
        }

        @media (max-width: 768px) {
            .splash-container {
                gap: 25px;
            }

            .logo-svg, .logo-image {
                width: 200px;
                max-height: 100px;
            }

            .text-wrapper h1 {
                font-size: 22px;
            }

            .transaction-step {
                width: 50px;
                height: 50px;
                font-size: 18px;
            }
        }
    </style>
</head>
<body>
    <div class="splash-container" id="splashContainer">
        <!-- Logo -->
        <div class="logo-wrapper">
            <img src="mainlogo2.jpeg" alt="Travo Rents Logo" class="logo-image">
        </div>

        <!-- Transaction Flow Animation -->
        <div class="transaction-flow">
            <div class="transaction-step">
                <span>$</span>
            </div>
            <div class="step-connector"></div>
            <div class="transaction-step">
                <span>✓</span>
            </div>
            <div class="step-connector"></div>
            <div class="transaction-step">
                <span>🚗</span>
            </div>
        </div>

        <!-- Text -->
        <div class="text-wrapper">
            <h1>Travo Rents</h1>
            <p>Processing Your Booking...</p>
        </div>

        <!-- Loading dots -->
        <div class="loading-dots">
            <div class="dot"></div>
            <div class="dot"></div>
            <div class="dot"></div>
        </div>
    </div>

    <script>
        // Auto-dismiss splash after 3.5 seconds
        const splashContainer = document.getElementById('splashContainer');
        
        setTimeout(() => {
            splashContainer.classList.add('fade-out');
            setTimeout(() => {
                // Redirect or remove splash based on your setup
                // Option 1: If splash is in an iframe or popup
                if (window.parent !== window) {
                    window.parent.postMessage('splash-complete', '*');
                }
                // Option 2: If splash is the main page, redirect to index.html
                setTimeout(() => {
                    window.location.href = 'index.html';
                }, 300);
            }, 800);
        }, 3500);

        // Listen for splash completion message
        window.addEventListener('message', (event) => {
            if (event.data === 'splash-complete') {
                splashContainer.classList.add('fade-out');
            }
        });
    </script>
</body>
</html>
